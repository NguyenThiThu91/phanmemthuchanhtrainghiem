<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Bé Trải Nghiệm Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        :root {
            --primary:#ff6b6b; --secondary:#4ecdc4; --accent:#feca57;
            --purple:#a29bfe; --green:#55efc4; --bg:#f0f9ff; --dark:#2d3436;
        }
        *{ box-sizing:border-box; font-family:'Nunito',sans-serif; }
        body{ background:var(--bg); margin:0; display:flex; justify-content:center; overflow-x:hidden; }
        #app{ width:100%; max-width:480px; background:#fff; min-height:100vh;
              box-shadow:0 0 40px rgba(0,0,0,.12); position:relative; padding-bottom:90px; }

        /* HEADER */
        .header{ background:linear-gradient(135deg,#ff6b6b,#ff9a3c);
                 color:#fff; padding:28px 20px 40px; text-align:center;
                 border-radius:0 0 50px 50px; }
        .header h1{ margin:0; font-size:26px; letter-spacing:1px; }
        .header p { margin:6px 0 0; font-size:14px; opacity:.85; }

        /* STATS */
        .stats{ display:flex; justify-content:space-around; padding:14px 16px;
                background:#fff; margin:-22px 18px 0; border-radius:20px;
                box-shadow:0 8px 24px rgba(0,0,0,.08); }
        .stat{ text-align:center; font-weight:900; }
        .stat span{ display:block; font-size:22px; color:var(--primary); }
        .stat small{ font-size:11px; color:#888; }

        /* TABS */
        .tabs{ display:flex; overflow-x:auto; padding:18px 16px 6px; gap:8px; scrollbar-width:none; }
        .tabs::-webkit-scrollbar{ display:none; }
        .tab{ padding:7px 16px; border-radius:50px; border:2px solid #e0e0e0;
              background:#fff; white-space:nowrap; cursor:pointer; font-weight:700;
              font-size:13px; transition:.2s; }
        .tab.on{ background:var(--secondary); color:#fff; border-color:var(--secondary); }

        /* GRID */
        .grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:14px 16px; }
        .card{ background:#fff; border:3px solid #f0f0f0; border-radius:24px;
               padding:16px 12px; text-align:center; cursor:pointer; transition:.25s; position:relative; }
        .card:hover{ transform:translateY(-4px); border-color:var(--secondary); box-shadow:0 8px 20px rgba(78,205,196,.2); }
        .card .ico { font-size:44px; margin-bottom:8px; }
        .card h3   { margin:0; font-size:13px; color:#444; line-height:1.35; }
        .card .mtag{ font-size:10px; color:#bbb; margin-top:3px; }
        .card .stars{ color:var(--accent); font-size:13px; margin-top:4px; min-height:18px; }
        .done-badge{ position:absolute; top:6px; right:8px; font-size:16px; }

        /* QUIZ */
        #quiz{ display:none; padding:16px; animation:fadeIn .4s; }
        .qheader{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
        .btn-back{ background:none; border:none; font-size:28px; cursor:pointer; padding:0; }
        .prog-wrap{ flex:1; background:#eee; border-radius:20px; height:10px; }
        .prog-fill{ background:linear-gradient(90deg,var(--secondary),var(--primary));
                    height:10px; border-radius:20px; transition:width .4s; }
        .prog-label{ font-size:12px; color:#999; font-weight:700; white-space:nowrap; }

        .q-card{ background:linear-gradient(135deg,#fff9e6,#fff3f3); padding:20px;
                 border-radius:28px; border:3px dashed var(--accent); margin-bottom:14px;
                 text-align:center; }
        .q-img { font-size:60px; display:block; margin-bottom:8px; }
        .q-text{ margin:0; color:var(--dark); font-size:17px; line-height:1.45; font-weight:900; }

        /* OPTIONS */
        .opts{ display:flex; flex-direction:column; gap:10px; }
        .opt { background:#fff; border:3px solid #ececec; border-radius:18px;
               padding:12px 14px; font-size:15px; font-weight:700; cursor:pointer;
               transition:.2s; display:flex; align-items:center; gap:12px; text-align:left; }
        .opt:hover:not(:disabled){ border-color:var(--primary); background:#fff8f8; }
        .opt .opt-emoji{ font-size:28px; flex-shrink:0; }
        .opt .opt-txt  { flex:1; line-height:1.3; }
        .opt .opt-num  { width:28px; height:28px; border-radius:50%; background:#f0f0f0;
                         display:flex; align-items:center; justify-content:center;
                         font-size:13px; flex-shrink:0; }
        .opt.correct{ border-color:#00b894; background:#e8faf4; }
        .opt.wrong  { border-color:#d63031; background:#ffeaea; }

        /* FEEDBACK */
        #feedback{ text-align:center; font-size:20px; font-weight:900;
                   min-height:36px; margin-top:10px; transition:.3s; }

        /* RESULT */
        #result{ display:none; text-align:center; padding:36px 20px; animation:popIn .5s; }
        .trophy { font-size:90px; }
        .r-stars{ font-size:38px; color:var(--accent); margin:14px 0; }
        .r-msg  { font-size:16px; color:#777; margin-bottom:24px; }
        .btn-main{ background:var(--primary); color:#fff; border:none; padding:14px 32px;
                   border-radius:50px; font-size:18px; font-weight:900; cursor:pointer;
                   box-shadow:0 6px 18px rgba(255,107,107,.4); }

        /* CONFETTI */
        .cf{ position:fixed; width:10px; height:10px; top:-10px; z-index:999; pointer-events:none; }

        @keyframes fadeIn{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
        @keyframes popIn { 0%{transform:scale(.5);opacity:0} 100%{transform:scale(1);opacity:1} }
    </style>
</head>

// ════════════════════
//  APP LOGIC
// ════════════════════
let prog={}, curL=null, qIdx=0, score=0, answered=false;
try{ prog=JSON.parse(localStorage.getItem('mamnon_v4'))||{}; }catch(e){}

const CATS=[
  {id:'all',label:'🏠 Tất cả'},
  {id:'t9', label:'📅 Tháng 9'},
  {id:'t10',label:'📅 Tháng 10'},
  {id:'t11',label:'📅 Tháng 11'},
  {id:'t12',label:'📅 Tháng 12'},
  {id:'t1', label:'📅 Tháng 1'},
  {id:'t2', label:'📅 Tháng 2'},
  {id:'t3', label:'📅 Tháng 3'},
  {id:'t4', label:'📅 Tháng 4'},
  {id:'t5', label:'📅 Tháng 5'},
];

// ── TTS ──
let ttsQueue=[], ttsBusy=false;
function speak(txt, cb){
  ttsQueue.push({txt,cb});
  if(!ttsBusy) nextSpeak();
}
function nextSpeak(){
  if(!ttsQueue.length){ ttsBusy=false; return; }
  ttsBusy=true;
  const {txt,cb}=ttsQueue.shift();
  try{ window.speechSynthesis.cancel(); }catch(e){}
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='vi-VN'; u.rate=0.88;
  u.onend=()=>{ if(cb)cb(); nextSpeak(); };
  u.onerror=()=>{ if(cb)cb(); nextSpeak(); };
  try{ window.speechSynthesis.speak(u); }catch(e){ if(cb)cb(); nextSpeak(); }
}
function speakNow(txt,cb){
  ttsQueue=[];
  try{ window.speechSynthesis.cancel(); }catch(e){}
  ttsBusy=false;
  speak(txt,cb);
}

// ── AUDIO ──
let actx=null;
function beep(freq,type,dur){
  try{
    if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type; o.frequency.value=freq;
    o.connect(g); g.connect(actx.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
    o.stop(actx.currentTime+dur);
  }catch(e){}
}

// ── HOME ──
function initHome(){
  const tabs=document.getElementById('tabs');
  tabs.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='tab'+(c.id==='all'?' on':'');
    b.textContent=c.label;
    b.onclick=()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      renderGrid(c.id);
      beep(440,'sine',0.08);
    };
    tabs.appendChild(b);
  });
  renderGrid('all');
  updateStats();
}

function updateStats(){
  let stars=0,done=0;
  Object.values(prog).forEach(p=>{ stars+=(p.stars||0); if(p.stars>0)done++; });
  document.getElementById('st-stars').textContent=stars;
  document.getElementById('st-done').textContent=done;
  document.getElementById('st-total').textContent=lessons.length;
}

function renderGrid(cat){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const list=cat==='all'?lessons:lessons.filter(l=>l.cat===cat);
  list.forEach(l=>{
    const p=prog[l.id]||{stars:0};
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=`
      ${p.stars>0?'<span class="done-badge">✅</span>':''}
      <div class="ico">${l.icon}</div>
      <h3>${l.title}</h3>
      <div class="mtag">${l.month}</div>
      <div class="stars">${'⭐'.repeat(p.stars)}</div>`;
    d.onclick=()=>startLesson(l);
    grid.appendChild(d);
  });
}

// ── QUIZ ──
function startLesson(l){
  curL=l; qIdx=0; score=0; answered=false;
  document.getElementById('home').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('quiz').style.display='block';
  showQ();
}

function showQ(){
  answered=false;
  const q=curL.questions[qIdx];
  const tot=curL.questions.length;
  document.getElementById('plabel').textContent=`${qIdx+1}/${tot}`;
  document.getElementById('pbar').style.width=((qIdx/tot)*100)+'%';
  document.getElementById('qimg').textContent=curL.qimg;
  document.getElementById('qtxt').textContent=q.q;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').style.color='';

  const container=document.getElementById('opts');
  container.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.dataset.idx=i;
    btn.innerHTML=`<span class="opt-num">${i+1}</span><span class="opt-emoji">${o.e}</span><span class="opt-txt">${o.t}</span>`;
    btn.onclick=()=>checkAns(i);
    container.appendChild(btn);
  });

  // Đọc câu hỏi rồi lần lượt đọc các đáp án
  let readTxt = q.q + '. ';
  q.opts.forEach((o,i)=>{ readTxt += `Đáp án ${i+1}: ${o.t}. `; });
  speakNow(readTxt);
}

function checkAns(i){
  if(answered) return;
  answered=true;
  const q=curL.questions[qIdx];
  const allBtns=[...document.querySelectorAll('.opt')];
  allBtns.forEach(b=>{ b.onclick=null; b.style.pointerEvents='none'; });

  if(i===q.c){
    score++;
    allBtns[i].classList.add('correct');
    document.getElementById('feedback').textContent='✅ ĐÚNG RỒI! GIỎI QUÁ! ⭐';
    document.getElementById('feedback').style.color='#00b894';
    beep(880,'sine',0.25);
    speakNow('Đúng rồi! Bé giỏi quá!', ()=>{
      setTimeout(nextQ, 600);
    });
  } else {
    allBtns[i].classList.add('wrong');
    allBtns[q.c].classList.add('correct');
    document.getElementById('feedback').textContent='💡 Đáp án đúng đã tô xanh nhé!';
    document.getElementById('feedback').style.color='#e17055';
    beep(200,'sawtooth',0.3);
    speakNow('Chưa đúng rồi! Đáp án đúng là: '+q.opts[q.c].t, ()=>{
      setTimeout(nextQ, 600);
    });
  }
}

function nextQ(){
  qIdx++;
  if(qIdx<curL.questions.length) showQ();
  else showResult();
}

// ── RESULT ──
function showResult(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';
  const tot=curL.questions.length;
  const pct=score/tot;
  const s=pct===1?3:pct>=0.6?2:1;
  if(!(prog[curL.id])||(prog[curL.id].stars||0)<s){
    prog[curL.id]={stars:s};
    try{ localStorage.setItem('mamnon_v4',JSON.stringify(prog)); }catch(e){}
  }
  const trophies=['','🌱','🥈','🏆'];
  const titles =['','Cố lên bé nhé! 💪','Bé giỏi lắm! 🌟','Xuất sắc! 🏆'];
  document.getElementById('r-trophy').textContent=trophies[s];
  document.getElementById('r-title').textContent=titles[s];
  document.getElementById('r-stars').textContent='⭐'.repeat(s);
  document.getElementById('r-msg').textContent=`Bé trả lời đúng ${score}/${tot} câu hỏi!`;
  if(s===3){
    confetti();
    beep(523,'sine',.2);
    setTimeout(()=>beep(659,'sine',.2),150);
    setTimeout(()=>beep(784,'sine',.4),300);
    speakNow('Chúc mừng bé đã hoàn thành xuất sắc!');
  } else {
    speakNow(titles[s]);
  }
  updateStats();
}

function goHome(){
  ttsQueue=[];
  try{ window.speechSynthesis.cancel(); }catch(e){}
  ttsBusy=false;
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('home').style.display='block';
  initHome();
}

// ── CONFETTI ──
function confetti(){
  const colors=['#ff6b6b','#4ecdc4','#feca57','#a29bfe','#55efc4'];
  for(let i=0;i<55;i++){
    const c=document.createElement('div');
    c.className='cf';
    c.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'3px'};transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(c);
    const a=c.animate([{top:'-10px',opacity:1},{top:'100vh',opacity:0,transform:`rotate(${Math.random()*720}deg)`}],
      {duration:2200+Math.random()*3000,easing:'cubic-bezier(0,1,1,1)'});
    a.onfinish=()=>c.remove();
  }
}

initHome();
</script>
