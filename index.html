<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Trải Nghiệm Pro - Phần Mềm Mầm Non</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #feca57;
            --purple: #a29bfe;
            --bg: #f0f9ff;
            --dark: #2d3436;
        }

        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; justify-content: center; overflow-x: hidden; }

        #app-container {
            width: 100%; max-width: 500px; background: white; min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.1); position: relative; padding-bottom: 80px;
        }

        /* Header & Stats */
        .header {
            background: linear-gradient(135deg, var(--primary), #ff8787);
            color: white; padding: 30px 20px; text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }

        .stats-bar {
            display: flex; justify-content: space-around; padding: 15px;
            background: #fff; margin: -20px 20px 0; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .stat-item { text-align: center; font-weight: bold; color: var(--dark); }
        .stat-item span { display: block; font-size: 20px; color: var(--primary); }

        /* Menu lọc */
        .category-scroll {
            display: flex; overflow-x: auto; padding: 20px; gap: 10px;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-btn {
            padding: 8px 18px; border-radius: 20px; border: 2px solid #eee;
            background: white; white-space: nowrap; cursor: pointer; font-weight: bold;
            font-size: 14px;
        }
        .cat-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }

        /* Danh sách bài học */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .lesson-card {
            background: white; border: 3px solid #f0f0f0; border-radius: 25px;
            padding: 15px; text-align: center; cursor: pointer; transition: 0.3s;
            position: relative;
        }
        .lesson-card:hover { transform: translateY(-5px); border-color: var(--secondary); }
        .lesson-card .icon { font-size: 45px; margin-bottom: 8px; }
        .lesson-card h3 { margin: 0; font-size: 14px; color: #444; line-height: 1.3; }
        .lesson-card .month-tag { font-size: 11px; color: #aaa; margin-top: 4px; }
        .stars-display { color: var(--accent); font-size: 14px; margin-top: 5px; }
        .badge-done { position: absolute; top: 5px; right: 5px; font-size: 18px; }

        /* Quiz Screen */
        #quiz-screen { display: none; padding: 20px; text-align: center; animation: fadeIn 0.5s; }
        .q-card {
            background: #fff9e6; padding: 20px; border-radius: 30px;
            border: 4px dashed var(--accent); margin-bottom: 15px; position: relative;
        }
        .q-image { font-size: 65px; margin-bottom: 10px; display: block; }
        
        .opt-btn {
            background: white; border: 3px solid #eee; border-radius: 20px;
            padding: 12px 16px; font-size: 16px; font-weight: bold; margin-bottom: 10px;
            cursor: pointer; transition: 0.2s; width: 100%; display: flex; align-items: center;
            gap: 12px; text-align: left;
        }
        .opt-btn:hover { border-color: var(--primary); background: #fffafa; }
        .opt-btn .num { min-width: 30px; height: 30px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .opt-btn.correct-ans { border-color: #2ecc71; background: #eafaf1; }
        .opt-btn.wrong-ans { border-color: #e74c3c; background: #fdf0ef; }

        /* Kết quả bài học */
        #result-screen { display: none; text-align: center; padding: 40px 20px; animation: popIn 0.5s; }
        .trophy { font-size: 100px; }
        .result-stars { font-size: 40px; color: var(--accent); margin: 20px 0; }

        /* Buttons */
        .btn-main {
            background: var(--primary); color: white; border: none; padding: 15px 30px;
            border-radius: 50px; font-size: 18px; font-weight: 900; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }
        .btn-back { position: absolute; top: 20px; left: 20px; background: none; border: none; font-size: 30px; cursor: pointer; z-index: 10; }

        /* Progress bar */
        .progress-bar-wrap { background: #eee; border-radius: 20px; height: 10px; margin-bottom: 15px; }
        .progress-bar-fill { background: linear-gradient(90deg, var(--secondary), var(--primary)); height: 10px; border-radius: 20px; transition: width 0.4s; }

        /* Anim */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }
        .correct { animation: bounce 0.5s; color: #2ecc71; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Pháo hoa */
        .confetti { position: fixed; width: 10px; height: 10px; background: red; top: -10px; z-index: 999; }

        /* Open question */
        .open-q-box {
            background: #f0fff4; border: 2px solid #2ecc71; border-radius: 20px;
            padding: 15px; margin-bottom: 10px; text-align: left;
        }
        .open-q-box p { margin: 0 0 8px; color: #27ae60; font-weight: bold; font-size: 14px; }
        .btn-open-next {
            background: var(--secondary); color: white; border: none; padding: 12px 25px;
            border-radius: 50px; font-size: 16px; font-weight: 900; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>

    // LOGIC ỨNG DỤNG
    // ============================
    let userProgress = {};
    try { userProgress = JSON.parse(localStorage.getItem('mamnon_v2')) || {}; } catch(e) {}
    
    let currentL = null;
    let currentQIdx = 0;
    let score = 0;
    let answered = false;

    // Âm thanh
    let audioCtx = null;
    function getAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }
    function playSound(freq, type, duration) {
        try {
            const ctx = getAudio();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
            osc.stop(ctx.currentTime + duration);
        } catch(e) {}
    }

    function initMenu() { renderMenu('all'); updateStats(); }

    function updateStats() {
        let totalStars = 0, completed = 0;
        Object.values(userProgress).forEach(l => { totalStars += (l.stars || 0); if (l.stars > 0) completed++; });
        document.getElementById('total-stars').innerText = totalStars;
        document.getElementById('completed-count').innerText = completed;
    }

    function renderMenu(cat) {
        const list = document.getElementById('menu-list');
        list.innerHTML = '';
        const filtered = cat === 'all' ? lessons : lessons.filter(l => l.cat === cat);
        filtered.forEach(l => {
            const progress = userProgress[l.id] || { stars: 0 };
            const card = document.createElement('div');
            card.className = 'lesson-card';
            card.innerHTML = `
                ${progress.stars > 0 ? '<span class="badge-done">✅</span>' : ''}
                <div class="icon">${l.icon}</div>
                <h3>${l.title}</h3>
                <div class="month-tag">${l.month}</div>
                <div class="stars-display">${'⭐'.repeat(progress.stars)}</div>
            `;
            card.onclick = () => startLesson(l);
            list.appendChild(card);
        });
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMenu(cat);
        playSound(440, 'sine', 0.1);
    }

    function startLesson(l) {
        currentL = l;
        currentQIdx = 0;
        score = 0;
        answered = false;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQ();
    }

    function showQ() {
        answered = false;
        const q = currentL.questions[currentQIdx];
        const total = currentL.questions.length;
        document.getElementById('progress-text').innerText = `Câu ${currentQIdx + 1} / ${total}`;
        document.getElementById('progress-bar').style.width = ((currentQIdx / total) * 100) + '%';
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('q-img').innerText = currentL.q_img;
        document.getElementById('feedback').innerText = '';

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.opts.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.id = `opt-${i}`;
            btn.innerHTML = `<span class="num">${i + 1}</span> ${o}`;
            btn.onclick = () => checkAns(i);
            container.appendChild(btn);
        });
        speak(q.q);
    }

    function checkAns(i) {
        if (answered) return;
        answered = true;
        const q = currentL.questions[currentQIdx];
        const fb = document.getElementById('feedback');

        // Đổi màu các nút
        document.querySelectorAll('.opt-btn').forEach((btn, idx) => {
            btn.onclick = null;
            if (idx === q.c) btn.classList.add('correct-ans');
            else if (idx === i && i !== q.c) btn.classList.add('wrong-ans');
        });

        if (i === q.c) {
            score++;
            fb.innerText = '✅ ĐÚNG RỒI! GIỎI QUÁ! ⭐';
            fb.style.color = '#2ecc71';
            playSound(880, 'sine', 0.3);
            speak('Đúng rồi, bé giỏi quá');
        } else {
            fb.innerText = '💡 Đáp án đúng đã được tô xanh nhé!';
            fb.style.color = '#e67e22';
            playSound(200, 'sawtooth', 0.3);
            speak('Bé xem lại đáp án đúng nhé');
        }

        setTimeout(() => {
            currentQIdx++;
            if (currentQIdx < currentL.questions.length) showQ();
            else showResult();
        }, 1800);
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';

        const totalQ = currentL.questions.length;
        const pct = score / totalQ;
        const starCount = pct === 1 ? 3 : pct >= 0.6 ? 2 : 1;

        if (!userProgress[currentL.id] || (userProgress[currentL.id].stars || 0) < starCount) {
            userProgress[currentL.id] = { stars: starCount };
            try { localStorage.setItem('mamnon_v2', JSON.stringify(userProgress)); } catch(e) {}
        }

        const titles = ['', 'Cố lên bé nhé! 💪', 'BÉ GIỎI LẮM! 🌟', 'XUẤT SẮC! 🏆'];
        const trophies = ['', '🌱', '🥈', '🏆'];
        document.getElementById('trophy-icon').innerText = trophies[starCount];
        document.getElementById('result-title').innerText = titles[starCount];
        document.getElementById('result-stars').innerText = '⭐'.repeat(starCount);
        document.getElementById('result-msg').innerText = `Bé đã trả lời đúng ${score}/${totalQ} câu hỏi!`;

        if (starCount === 3) {
            spawnConfetti();
            playSound(523.25, 'sine', 0.2);
            setTimeout(() => playSound(659.25, 'sine', 0.2), 150);
            setTimeout(() => playSound(783.99, 'sine', 0.4), 300);
            speak('Chúc mừng bé đã hoàn thành xuất sắc');
        }
    }

    function goHome() {
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
        initMenu();
    }

    function speak(txt) {
        try {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(txt);
            u.lang = 'vi-VN';
            u.rate = 0.85;
            window.speechSynthesis.speak(u);
        } catch(e) {}
    }

    function spawnConfetti() {
        for (let i = 0; i < 50; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            c.style.backgroundColor = ['#ff6b6b', '#4ecdc4', '#feca57', '#a29bfe', '#2ecc71'][Math.floor(Math.random() * 5)];
            c.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(c);
            const animation = c.animate([
                { top: '-10px', opacity: 1 },
                { top: '100vh', opacity: 0, transform: `rotate(${Math.random() * 720}deg)` }
            ], { duration: 2000 + Math.random() * 3000, easing: 'cubic-bezier(0,1,1,1)' });
            animation.onfinish = () => c.remove();
        }
    }

    initMenu();
</script>
</body>
</html>
